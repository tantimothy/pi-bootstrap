menu:
  id: nanoclaw-mnemon
  name: "NanoClaw + Mnemon"
  icon: utilities-terminal
deployed_check:
  # Container-mode only — unlike the plain nanoclaw environment, there's no
  # host/systemd/launchd mode to detect here. Mirrors run.sh's own
  # docker run --name "$CONTAINER_NAME"; there's no docker-compose.yml
  # here to read from directly the way from_compose_service does.
  kind: container
  value: "${CONTAINER_NAME:-nanoclaw-mnemon}"
entries:
  - id: pi-bootstrap-nanoclaw-mnemon
    name: "NanoClaw + Mnemon AI"
    comment: "NanoClaw with persistent memory (mnemon), optional Ollama embeddings, and Karpathy wiki scaffolding"
    icon: utilities-terminal
    kind: exec
    target: 'bash -c "cd ''${ENV_DIR}'' && REBUILD_POLICY=FAST ./run.sh"'
    terminal: true
info:
  id: pi-bootstrap-nanoclaw-mnemon-info
  name: "NanoClaw + Mnemon Info"
