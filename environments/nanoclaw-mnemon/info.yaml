data_dirs:
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw-mnemon}/groups"
    description: "Per-group files: conversation history, mnemon's persistent memory graph (nested under each group's .claude/mnemon/), transcripts, CLAUDE.md"
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw-mnemon}/data"
    description: "Sessions, message DB, task scheduler DB, IPC streams"
install_dirs:
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw-mnemon}"
    description: "NanoClaw + mnemon repo/binaries (groups/ and data/ live inside here)"
named_volumes: []
data_dirs_label: "📁 Persistent Data Directories (back these up):"
install_dirs_label: "📂 Install Directories (can be re-cloned by CLEAN):"
delete_install_dirs: false
delete_confirm_msg: "All conversation history and mnemon's persistent memory graph will be lost."
# NanoClaw itself still has no default web interface of its own — its own
# README says so directly ("Beyond setup there's no monitoring dashboard or
# debugging UI either: describe the problem in chat"). NANOCLAW_PORT exists
# only to pre-reserve a port on the container in case you later add its
# optional `/add-dashboard` skill (a separate npm package, its own
# DASHBOARD_PORT/DASHBOARD_SECRET, not wired to this variable at all) — it
# was previously advertised here as a working URL, which it never was. This
# environment no longer bundles Open WebUI either (see the standalone
# `chat-frontends` environment instead) — so there's genuinely no web UI here.
web_uis: []
custom_actions:
  - label: "Scaffold a Wiki for a Group"
    command: 'read -rp "Group folder name (under groups/): " GROUP; bash ${ENV_DIR}/scripts/scaffold-wiki.sh "$GROUP"'
  - label: "Reload Mnemon for a Group"
    command: "bash ${ENV_DIR}/scripts/reload-mnemon.sh"
  - label: "Check / Restart Ollama"
    command: "bash ${PROJECT_DIR}/ollama-watchdog.sh"
  # Not this environment's own container — a convenience shortcut into the
  # separate, standalone claude-cli environment (if it's deployed on this
  # same machine), for a plain terminal Claude session alongside NanoClaw's
  # own chat-platform one. $SSH_PORT is deliberately NOT ${SSH_PORT} here —
  # ${...} markers get eagerly expanded against THIS environment's own
  # scope (deploy.sh has no SSH_PORT of its own while processing this
  # info.yaml, so a ${SSH_PORT:-2222} marker would resolve to a permanently
  # hardcoded "2222" the moment this file loads, never claude-cli's real,
  # possibly-different configured port). Plain $SSH_PORT survives that
  # expansion untouched and is instead resolved live, inside the `bash -c`
  # that actually runs this command, after sourcing claude-cli's own real
  # .env — see docs/lessons-learned/general.md's "${VAR}-expansion" entry
  # for the underlying mechanism this works around.
  - label: "SSH into Claude CLI"
    command: 'CLI_ENV="${PROJECT_DIR}/environments/claude-cli/.env"; if [ ! -f "$CLI_ENV" ]; then echo "Claude CLI environment is not deployed yet -- deploy it first from Environments > Claude CLI."; exit 1; fi; set -a; source "$CLI_ENV"; set +a; ssh -p "$SSH_PORT" claude@localhost'
# |2 pins the strip to exactly 2 spaces regardless of which line is
# least-indented — "📌 Notes:" is intentionally at column 0 in the
# rendered output; see ntopng/info.yaml for the full explanation. The
# $NANOCLAW_INSTALL_PATH references below are deliberately NOT ${...}
# markers — they're meant to stay literal, evaluated by the container's own
# shell when the user runs the command, not substituted by this script.
useful_commands: |2
     docker ps --filter name=nanoclaw-mnemon                         # Orchestrator status
     docker logs -f nanoclaw-mnemon                                  # Orchestrator live logs
     docker restart nanoclaw-mnemon                                  # Restart after a config change
     docker ps --filter name=nanoclaw-agent                          # List agent containers (both nanoclaw environments, if both deployed)
     docker exec -it nanoclaw-mnemon bash -lc "cd $NANOCLAW_INSTALL_PATH && claude"   # Then: /add-telegram, /add-whatsapp, /add-discord, etc. (see README's "Adding Channels")
     docker exec -it nanoclaw-mnemon bash -lc "cd $NANOCLAW_INSTALL_PATH && bash setup/register-claude-token.sh"   # Update Anthropic API key
     ollama pull llama3.2                                              # Pull a chat-capable model for mnemon's optional embeddings (nomic-embed-text is embedding-only)

  📌 Notes:
     🧠 mnemon (github.com/mnemon-dev/mnemon) is patched into NanoClaw's own agent
        sandbox image — persistent, cross-session graph memory per conversation
        group. Patched idempotently on every deploy; see run.sh's apply_mnemon_patch.
     🐳 NanoClaw manages its own Docker containers per conversation group.
        Use the Docker Manager in the deploy menu to view or delete them.
     ❌ iMessage isn't offered — this environment is container-mode only (see
        the README's "Deployment Modes" section for why).
     🌐 Want a chat UI for Ollama? See the standalone `chat-frontends` environment
        instead — this environment no longer bundles one of its own.
     🖥️ Need a plain terminal Claude session instead of the chat-platform
        one? "SSH into Claude CLI" in this environment's own deploy.sh menu
        jumps into the separate, standalone claude-cli environment's own
        SSH session — deploy that environment too if you haven't.
