menu:
  id: portainer
  name: Portainer
  icon: docker
deployed_check:
  kind: container
  # Read straight from docker-compose.yml's own container_name field for
  # this service — that's the only place the actual name (and its
  # CONTAINER_NAME-driven default) is declared.
  from_compose_service: portainer
entries:
  - id: pi-bootstrap-portainer
    name: Portainer
    comment: "Full Docker container/network/volume management UI"
    icon: docker
    kind: link
    target: "http://localhost:${PORTAINER_PORT:-9000}"
info:
  id: pi-bootstrap-portainer-info
  name: "Portainer Info"
