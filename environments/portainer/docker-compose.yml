services:
  # Full Docker management UI — containers, images, networks, volumes,
  # start/stop/exec, live stats. Confirmed multi-arch (amd64/arm64/armv7)
  # directly against the Docker Hub registry API before adding this.
  portainer:
    container_name: ${CONTAINER_NAME:-portainer}
    image: portainer/portainer-ce:latest
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'portainer_data:/data'
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
    restart: unless-stopped

volumes:
  portainer_data:
    # Pinned to a literal name instead of letting Compose auto-prefix it with
    # the project name (derived from this directory's name) — otherwise
    # renaming or re-cloning this environment into a differently-named
    # directory silently creates a brand-new empty volume instead of reusing
    # the existing one, orphaning whatever was in it (e.g. the admin account).
    #
    # Pinned to "portainer_portainer_data" (matching the auto-generated name
    # this environment's own prior rename already produced), NOT the cleaner
    # unprefixed "portainer_data" — an earlier version of this fix pinned to
    # the clean name and got it backwards: since a deployment already exists
    # under this exact directory, "portainer_portainer_data" is what's
    # actually live right now. Pinning to anything else would silently
    # orphan it and force yet another admin account recreation, the same
    # class of bug this fix exists to prevent.
    name: portainer_portainer_data
