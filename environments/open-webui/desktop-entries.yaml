menu:
  id: open-webui
  name: Open WebUI
  icon: applications-science
deployed_check:
  kind: container
  # Read straight from docker-compose.yml's own container_name field for
  # this service — that's the only place the actual name (and its
  # CONTAINER_NAME-driven default) is declared.
  from_compose_service: open-webui
entries:
  - id: pi-bootstrap-open-webui
    name: Open WebUI
    comment: "Chat-style web frontend for local Ollama models"
    icon: applications-science
    kind: link
    target: "http://localhost:${OPEN_WEBUI_PORT:-3010}"
info:
  id: pi-bootstrap-open-webui-info
  name: "Open WebUI Info"
