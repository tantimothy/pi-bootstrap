data_dirs: []
install_dirs: []
named_volumes:
  - name: open-webui_open_webui_data
    description: "Open WebUI's own app state — accounts, chat history, per-model settings"
delete_confirm_msg: "All Open WebUI accounts and chat history will be lost. Ollama itself (and its downloaded models) is untouched — it isn't managed by this environment."
web_uis:
  - name: "Open WebUI"
    url: "http://${HOST_IP}:${OPEN_WEBUI_PORT:-3010}"
useful_commands: |2
     docker logs -f open-webui                                         # Open WebUI live logs
     ollama list                                                       # Models available to it
     ollama pull llama3.2                                              # Pull a chat-capable model

  📌 Notes:
     🦙 Talks to the Ollama daemon already running on your HOST (see the
        nanoclaw-mnemon environment's own Ollama setup) — this environment
        doesn't run or manage Ollama itself, deliberately: one shared
        daemon, reused by both this UI and mnemon's embeddings.
     🔑 First visit creates the initial admin account — whoever signs up
        first on a fresh install becomes admin. Don't leave this exposed
        to an untrusted network before that first sign-up.
