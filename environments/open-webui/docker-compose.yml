services:
  # Chat-style web frontend for Ollama (and other OpenAI/Ollama-compatible
  # APIs) — confirmed multi-arch (amd64/arm64) directly against the image's
  # own registry before adding this. Talks to the Ollama daemon already
  # running on the HOST (see the nanoclaw-mnemon environment, which also
  # depends on that same host-level Ollama install) — this environment
  # doesn't run its own Ollama, deliberately: one shared daemon, reused by
  # both this UI and mnemon's embeddings, rather than a second redundant
  # instance.
  open-webui:
    container_name: ${CONTAINER_NAME:-open-webui}
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
    # Docker Desktop/OrbStack already resolve host.docker.internal inside
    # containers automatically; extra_hosts here is what makes the exact
    # same hostname work on a plain Linux Docker host too, where it isn't
    # built in. See this environment's README for a real, confirmed caveat
    # on OrbStack specifically: it resolves this to its own internal
    # pseudo-address rather than the bridge network's actual gateway, which
    # breaks reaching anything published via another container's own port
    # mapping — but the HOST's own Ollama daemon (not a container) is
    # reachable through it regardless, since that's exactly the case this
    # mechanism is designed for.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-3010}:8080"
    restart: unless-stopped

volumes:
  open_webui_data:
    # Pinned to a literal name for the same reason portainer's own volume
    # is pinned — see that environment's docker-compose.yml comment. Without
    # this, renaming or re-cloning this environment's directory would
    # silently create a brand-new empty volume instead of reusing the
    # existing one, orphaning every account/chat history/setting in it.
    name: open-webui_open_webui_data
