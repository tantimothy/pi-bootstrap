modules:
  # Standard HTTP 2xx probe — used for all local service health checks
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: []  # empty = accept any 2xx
      method: GET
      no_follow_redirects: false
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true

  # ICMP ping — requires NET_RAW capability on the container
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  # DNS resolution check — verifies Pi-hole can resolve external names
  dns_google:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip4
      transport_protocol: udp
      query_name: google.com
      query_type: A
