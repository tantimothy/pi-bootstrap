services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    environment:
      - TZ=${TZ:-Asia/Singapore}
      - WEBPASSWORD=${FTLCONF_webserver_api_password}
      - FTLCONF_dns_upstreams
    cap_add:
      - NET_ADMIN
    volumes:
      - './etc-pihole:/etc/pihole'
    network_mode: host
    restart: unless-stopped

  wg-easy:
    container_name: wg-easy
    image: ghcr.io/wg-easy/wg-easy:latest
    depends_on:
      - pihole
    environment:
      - TZ=${TZ:-Asia/Singapore}
      - WG_HOST=${WG_HOST}
      - WG_DEFAULT_DNS=${WG_DNS:-10.8.0.1}
      - PASSWORD_HASH=${PASSWORD_HASH}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-0.0.0.0/0}
      - "WG_POST_UP=:"
      - "WG_PRE_DOWN=:"
    volumes:
      - './etc-wireguard:/etc/wireguard'
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  # Scrapes Pi-hole v6 API and exposes metrics for Prometheus
  pihole-exporter:
    container_name: pihole-exporter
    image: ekofr/pihole-exporter:latest
    environment:
      - PIHOLE_HOSTNAME=host.docker.internal
      - PIHOLE_PORT=${PIHOLE_WEB_PORT:-80}
      - PIHOLE_PASSWORD=${FTLCONF_webserver_api_password}
      - PORT=9617
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      pihole_wg_net:
    depends_on:
      - pihole
    restart: unless-stopped

  # Reads WireGuard kernel stats (wg show) and exposes metrics for Prometheus
  # Runs on host network to see the wg0 interface managed by wg-easy
  wireguard-exporter:
    container_name: wireguard-exporter
    image: mindflavor/prometheus-wireguard-exporter:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PROMETHEUS_WIREGUARD_EXPORTER_PORT=9586
    # The image's own default CMD is just ["-a"] — a flag with no value —
    # which crash-loops the container (clap: "argument requires a value").
    # The container runs as a non-root user with a pre-configured
    # passwordless sudo rule specifically so "-a true" can prepend sudo to
    # its internal `wg show` calls; override the command explicitly rather
    # than relying on the broken default.
    command: ["-a", "true"]
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    volumes:
      - './monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - 'prometheus_data:/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      pihole_wg_net:
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - 'grafana_data:/var/lib/grafana'
      - './monitoring/grafana/provisioning:/etc/grafana/provisioning:ro'
      - './monitoring/grafana/dashboards:/etc/grafana/dashboards:ro'
    depends_on:
      - prometheus
    networks:
      pihole_wg_net:
    restart: unless-stopped

  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:latest
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - 'uptime_kuma_data:/app/data'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      pihole_wg_net:
    restart: unless-stopped

  # Pi host system metrics — CPU, RAM, disk, network I/O, filesystem
  # Runs on host network so it sees the real host interfaces and mounts
  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    network_mode: host
    pid: host
    restart: unless-stopped

  # Network traffic monitor — per-host bandwidth, protocol breakdown, top talkers
  # Builds locally from Debian apt so it works on ARM (Raspberry Pi).
  darkstat:
    container_name: darkstat
    build: ./darkstat
    environment:
      - DARKSTAT_INTERFACES=${DARKSTAT_INTERFACES:-eth0}
      - DARKSTAT_PORT=${DARKSTAT_PORT:-667}
    # darkstat's "-f" flag is a tcpdump-style BPF capture filter expression,
    # not a database file path — passing a path there makes pcap_compile()
    # fail immediately ("can't parse filter expression: syntax error") and
    # crash-loop. Persisting the hosts database across restarts actually
    # uses the separate --import/--export flags.
    # darkstat also daemonizes (forks to the background) by default, which
    # breaks Docker: the foreground process Docker tracks as the container's
    # main process exits cleanly right after the fork, so Docker restarts
    # the "finished" container in a loop even though nothing crashed.
    # --no-daemon keeps it in the foreground where Docker expects it.
    entrypoint: ["sh", "-c", "exec darkstat $(printf ' -i %s' $$DARKSTAT_INTERFACES) -p $$DARKSTAT_PORT --no-daemon --import /var/lib/darkstat/darkstat.db --export /var/lib/darkstat/darkstat.db"]
    volumes:
      - './darkstat-db:/var/lib/darkstat'
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  # Network presence scanner — discovers every device on the LAN (ARP scan),
  # alerts on new/unknown devices, and tracks online/offline history. Runs on
  # host network for Layer 2 access (ARP), same requirement as darkstat.
  # Security posture mirrors upstream's own hardened baseline compose file:
  # read-only rootfs, all capabilities dropped except the specific ones ARP
  # scanning actually needs, plus a tmpfs /tmp since the rootfs is read-only.
  netalertx:
    container_name: netalertx
    image: ghcr.io/netalertx/netalertx:latest
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    # ARP flux mitigation, matching upstream's recommendation for accurate
    # scans under host networking. NOT set here as a Compose `sysctls:`
    # entry — under network_mode: host, Docker/runc rejects per-container
    # sysctls entirely ("not allowed in host network namespace"), since
    # there's no network namespace of its own to scope them to. run.sh sets
    # these two directly on the host instead (idempotent, safe to re-run).
    volumes:
      - './netalertx-data:/data'
      - '/etc/localtime:/etc/localtime:ro'
      # Read-only access to Pi-hole's DHCP leases (if Pi-hole's own DHCP
      # server is enabled) — lets the optional "Pi-hole - DHCP leases
      # import" plugin resolve device names. Enable it from NetAlertX's own
      # Settings > Plugins UI; it's not on by default.
      - './etc-pihole:/pihole-data:ro'
    tmpfs:
      - "/tmp:mode=1700,rw,noexec,nosuid,nodev"
    environment:
      - LISTEN_ADDR=0.0.0.0
      - PORT=${NETALERTX_PORT:-20211}
      - GRAPHQL_PORT=${NETALERTX_GRAPHQL_PORT:-20212}
    restart: unless-stopped

  # Internet speed test — runs a full Speedtest CLI test when Prometheus scrapes it
  speedtest-exporter:
    container_name: speedtest-exporter
    image: ghcr.io/miguelndecarvalho/speedtest-exporter:latest
    networks:
      pihole_wg_net:
    restart: unless-stopped
    # The image's own default healthcheck spiders "localhost", which some
    # Docker setups resolve to ::1 (IPv6) first — but the exporter only
    # binds IPv4, so it gets "connection refused" and shows unhealthy even
    # though the exporter (and Prometheus's actual scrape, over the bridge
    # network's IPv4 address) work fine. Pin it to 127.0.0.1 explicitly.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9798/ || exit 1"]

  # HTTP / ICMP / DNS probing for service health and latency
  blackbox-exporter:
    container_name: blackbox-exporter
    image: prom/blackbox-exporter:latest
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    volumes:
      - './monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro'
    cap_add:
      - NET_RAW
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      pihole_wg_net:
    restart: unless-stopped

  # Real-time log viewer for every container on this host (read-only — no
  # start/stop/exec capability, just tails logs). Needs the Docker socket to
  # list containers and stream their logs; mounted read-only since Dozzle
  # itself never needs to write to it.
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    ports:
      - "${DOZZLE_PORT:-8888}:8080"
    networks:
      pihole_wg_net:
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:

networks:
  pihole_wg_net:
    name: pihole_wg_network
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.20.0.0/16}
          gateway: 172.20.0.1
