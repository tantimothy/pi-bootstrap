data_dirs: []
install_dirs: []
# Names are ${CONTAINER_NAME}-expanded — matching docker-compose.yml's own
# volume `name:` fields — so a second instance's INFO/WIPE/backup.sh only
# ever touches its own volumes, never a sibling instance's.
named_volumes:
  - name: ${CONTAINER_NAME:-claude-cli}_claude_home
    description: "Claude CLI's own OAuth/session state (~/.claude) — deleting this signs you out, next login re-prompts /login"
  - name: ${CONTAINER_NAME:-claude-cli}_ssh_host_keys
    description: "This container's own SSH host keys — deleting this changes its SSH fingerprint, you'll see a REMOTE HOST IDENTIFICATION HAS CHANGED warning on your next connection"
delete_confirm_msg: "Claude CLI's login session and this container's SSH host key identity will be lost — you'll need to /login again and your SSH client will warn about a changed host key on next connect. Your workspace repo at CLAUDE_WORKSPACE_PATH is NOT touched (it's your own pre-existing directory, not something this environment owns)."
web_uis: []
custom_actions:
  - label: "SSH into Claude CLI"
    command: 'ssh -p ${SSH_PORT:-2222} claude@localhost'
  - label: "Point Claude CLI at a Gateway (LiteLLM/Portkey)"
    command: "bash ${ENV_DIR}/scripts/point-to-gateway.sh"
  - label: "Revert Claude CLI to Anthropic (undo Gateway)"
    command: "bash ${ENV_DIR}/scripts/revert-to-claude.sh"
  - label: "New Claude CLI Instance..."
    command: "bash ${ENV_DIR}/new-instance.sh"
useful_commands: |2
     ssh -p ${SSH_PORT:-2222} claude@localhost                       # attach to the live tmux "claude" session
     docker exec -it ${CONTAINER_NAME:-claude-cli} tmux attach -t claude   # same thing, from the host directly (no SSH key needed)
     docker logs -f ${CONTAINER_NAME:-claude-cli}                    # sshd logs
     ./scripts/point-to-gateway.sh [litellm|portkey]                 # Redirect Claude CLI at a self-hosted gateway (see README)
     ./scripts/revert-to-claude.sh                                   # Undo — back to api.anthropic.com

  📌 Notes:
     🔑 First connection: run `claude` interactively once (via either
        command above) and follow its own `/login` flow — this only needs
        doing once per ${CONTAINER_NAME:-claude-cli}_claude_home volume.
     💻 Multiple devices can SSH in at once and land in the SAME tmux
        session — closing one terminal doesn't end the conversation,
        it just detaches. Reconnect from anywhere to pick it back up.
     🔀 Pointing Claude CLI at LiteLLM/Portkey (see "Pointing Claude CLI
        at a Gateway" in the README): fill in .env.gateway.litellm and/or
        .env.gateway.portkey first, then use the two menu actions above
        (or the scripts directly). Both restart the container — any live
        tmux session ends, but reconnecting resumes it (--continue).
