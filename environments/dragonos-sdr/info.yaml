data_dirs:
  - path: "${SCRIPT_DIR}/workspace/captures"
    description: "SDR captures, signal recordings, and analysis outputs"
  - path: "${SCRIPT_DIR}/workspace/msf_data"
    description: "Metasploit Framework data — workspace, loot, credentials"
install_dirs: []
named_volumes: []
wipe_parent_dirs:
  - "${SCRIPT_DIR}/workspace"
delete_confirm_msg: "All SDR captures will be lost."
# |2 pins the strip to exactly 2 spaces — a plain "|" here would infer the
# strip amount from this block's own uniform 3-space indent and strip ALL
# of it, losing the leading spaces the rendered output is meant to have.
useful_commands: |2
     docker exec -it ${CONTAINER_NAME:-sdr-dragonos-core} /usr/local/bin/sdr-menu.sh   # Reattach to SDR menu
     docker exec -it ${CONTAINER_NAME:-sdr-dragonos-core} bash                          # Open shell in container
     docker logs ${CONTAINER_NAME:-sdr-dragonos-core}                                   # Container logs
     ls ${SCRIPT_DIR}/workspace/captures/                            # Browse SDR captures
