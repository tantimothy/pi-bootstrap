# --- Equivalent of: caption always %{ Mk}%-w%{ Wk}%n %t%{ Mk}%+w ---
# Enable status bar
set -g status on
set -g status-position bottom
set -g status-style fg=white,bg=black # Default colors (Wk)

# Window list format (equivalent to %-w%n %t%+w)
set-window-option -g window-status-format "#[fg=magenta,bg=black] #I #W "
# Current window format (highlighted)
set-window-option -g window-status-current-format "#[fg=white,bg=magenta,bold] #I #W "

# --- Equivalent of: shelltitle $ |bash ---
# Automatic title renaming based on active process
#set-window-option -g automatic-rename on
#set-window-option -g automatic-rename-format "#{pane_current_command}"

# --

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command}"

# Enable automatic renaming by programs within panes 

set-window-option -g automatic-rename on
set-option -g allow-rename on

# set automatic renumbering when closing windows
set -g renumber-windows on

# Set the automatic window name format to list pane information 
# The format uses tmux variables like #{pane_index} and #{pane_current_command}

set-window-option -g automatic-rename-format "#{P:#{pane_index}-#{pane_current_command} } (#P)"

# Enable mouse mode
#set -g mouse on

# Change pane colors
set -g pane-active-border fg=black
set -ag pane-active-border bg=white

# Reload .tmus.conf
# C-b r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Create new window with current path
# C-b c
bind c new-window -c "#{pane_current_path}"

# Toggling Windows and Sessions
# C-b <space>
# bind Space last-window

# Resizing
# C-b C-i / C-b C-j / C-b C-k / C-b C-l
bind -r C-k resize-pane -D 15
bind -r C-i resize-pane -U 15
bind -r C-j resize-pane -L 15
bind -r C-l resize-pane -R 15

# Breaking and Joining Panes
# C-b j
bind j choose-window 'join-pane -h -s "%%"'
bind J choose-window 'join-pane -s "%%"'
