data_dirs:
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw}/groups"
    description: "Per-group files: conversation history, memory wiki, transcripts, CLAUDE.md"
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw}/data"
    description: "Sessions, message DB, task scheduler DB, IPC streams"
install_dirs:
  - path: "${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw}"
    description: "NanoClaw repo + built binaries (groups/ and data/ live inside here)"
named_volumes: []
data_dirs_label: "📁 Persistent Data Directories (back these up):"
install_dirs_label: "📂 Install Directories (can be re-cloned by CLEAN):"
delete_install_dirs: false
delete_confirm_msg: "All conversation history and memory will be lost."
# No web_uis entry: NanoClaw has no default web interface at all — its own
# README says so directly ("Beyond setup there's no monitoring dashboard or
# debugging UI either: describe the problem in chat"). NANOCLAW_PORT exists
# only to pre-reserve a port on the container in case you later add its
# optional `/add-dashboard` skill (a separate npm package, its own
# DASHBOARD_PORT/DASHBOARD_SECRET, not wired to this variable at all) — it
# was previously advertised here as a working URL, which it never was.
# These two are NOT part of the shared info.yaml schema — nanoclaw/info.sh
# reads them directly and picks one based on `uname`, since NanoClaw's own
# host-mode-vs-container-mode split (Linux: systemd; macOS: no systemd,
# always container mode) means the two platforms genuinely need different
# top-of-list commands, not just different values for the same command.
# |2 pins the strip to exactly 2 spaces — a plain "|" would infer the strip
# amount from each block's own uniform 3-space indent and strip it all.
useful_commands_host: |2
     systemctl status nanoclaw                                        # Service status
     journalctl -u nanoclaw -f                                       # Live logs
     sudo systemctl restart nanoclaw                                 # Restart service
useful_commands_macos: |2
     tail -f ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw}/logs/nanoclaw.log                        # Live logs
useful_commands: |2
     docker ps --filter name=nanoclaw                                # List agent containers
     cd ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw} && bash setup/add-whatsapp.sh                # Add WhatsApp channel
     cd ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw} && bash setup/add-telegram.sh                # Add Telegram channel
     cd ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw} && bash setup/add-discord.sh                 # Add Discord channel
     cd ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw} && bash setup/add-imessage.sh                # Add iMessage channel
     cd ${NANOCLAW_INSTALL_PATH:-/home/pi/nanoclaw} && bash setup/register-claude-token.sh       # Update Anthropic API key

  📌 Notes:
     🐳 NanoClaw manages its own Docker containers per conversation group.
        Use the Docker Manager in the deploy menu to view or delete them.
     🌐 Want a chat UI for Ollama itself (separate from NanoClaw's own
        conversation)? Deploy the separate open-webui environment — same
        host Ollama daemon, its own browser UI at http://<host-ip>:3010
        by default (not listed under Web UIs above since it's a separate,
        optional environment, not part of this one).
